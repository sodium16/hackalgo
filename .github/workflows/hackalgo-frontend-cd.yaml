name: Release hackalgo-frontend

on:
  workflow_call:
permissions:
  contents: read
  packages: read

jobs:
  
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Netlify
    environment: frontend-prod
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/hackalgo-frontend/package-lock.json

      - name: Install algokit
        run: pipx install algokit

      - name: Install frontend dependencies
        working-directory: projects/hackalgo-frontend
        run: npm ci

      - name: Bootstrap dependencies
        run: algokit project bootstrap all --project-name 'hackalgo-frontend'
    